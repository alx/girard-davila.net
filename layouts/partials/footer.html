<footer class="bg-white border-t border-gray-100">
    <div class="max-w-7xl mx-auto px-6 lg:px-8 py-8">
        <div class="flex flex-col md:flex-row justify-between items-center text-sm text-gray-600 space-y-4 md:space-y-0">
            <p>&copy; {{ now.Format "2006" }} Girard-Davila</p>
            <div class="flex space-x-6">
                {{ with .Site.Params.social.github }}
                <a href="{{ . }}" rel="me" target="_blank" rel="noopener noreferrer" class="hover:text-gray-900 transition-colors duration-200">
                    GitHub
                </a>
                {{ end }}
                {{ with .Site.Params.social.linkedin }}
                <a href="{{ . }}" target="_blank" rel="noopener noreferrer" class="hover:text-gray-900 transition-colors duration-200">
                    LinkedIn
                </a>
                {{ end }}
            </div>
        </div>
    </div>
</footer>
